version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: emergency_db
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: emergency_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: auth_service
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/emergencydb?schema=auth"
      JWT_SECRET: "your_super_secret_key"
      JWT_EXPIRES_IN: "1h"
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev

  incident-service:
    build:
      context: ./services/incident-service
      dockerfile: Dockerfile
    container_name: incident_service
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/emergencydb?schema=incident"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672"
      JWT_SECRET: "your_super_secret_key"
      PORT: 3002
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: npm run dev

  dispatch-service:
    build:
      context: ./services/dispatch-service
      dockerfile: Dockerfile
    container_name: dispatch_service
    ports:
      - "3003:3003"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/emergencydb?schema=dispatch"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672"
      JWT_SECRET: "your_super_secret_key"
      PORT: 3003
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: npm run dev

  tracking-service:
    build:
      context: ./services/tracking-service
      dockerfile: Dockerfile
    container_name: tracking_service
    ports:
      - "3004:3004"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/emergencydb?schema=tracking"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672"
      JWT_SECRET: "your_super_secret_key"
      PORT: 3004
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev

  hospital-service:
    build:
      context: ./services/hospital-service
      dockerfile: Dockerfile
    container_name: hospital_service
    ports:
      - "3005:3005"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/emergencydb?schema=hospital"
      JWT_SECRET: "your_super_secret_key"
      PORT: 3005
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev

volumes:
  postgres_data:
